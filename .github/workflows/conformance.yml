name: mcp-conformance
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true
jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CONFORMANCE_NAME: mavedb-link        # serverInfo.name
      CONFORMANCE_TIER: stateless
      MCP_PORT: "8023"                    # docker-compose host port
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --group dev
      - name: Build & start server
        run: make docker-build && make docker-up
      - name: Wait for health + MCP readiness
        run: |
          # NB: GitHub runs `run:` under `bash -e`. curl exits 7 on connection-refused, so the
          # very first poll against a not-yet-listening port would kill the step -- hence the
          # `>/dev/null 2>&1 && break` / `|| echo 000` guards below (a poll loop that can poll).
          for i in $(seq 1 60); do
            curl -fsS "http://127.0.0.1:${MCP_PORT}/health" >/dev/null 2>&1 && break
            sleep 2
          done
          # /health (the REST app) comes up before the MCP sub-app finishes binding; wait for /mcp
          # too, so the first probe POST does not race a not-yet-ready endpoint.
          ready=""
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "http://127.0.0.1:${MCP_PORT}/mcp" \
              -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"wait","version":"0"}}}' \
              || echo 000)
            if [ "$code" = "200" ]; then ready=1; break; fi
            sleep 2
          done
          if [ -z "$ready" ]; then
            echo "::error::/mcp never returned 200 within 120s (last code: ${code})"
            docker compose -f docker/docker-compose.yml logs --no-color --tail=100 || true
            exit 1
          fi
      - name: Run conformance probe
        env:
          CONFORMANCE_MCP_URL: http://127.0.0.1:${{ env.MCP_PORT }}
        run: uv run pytest tests/conformance/test_transport_v1.py -v
      - name: Run behaviour probe
        # Behaviour Conformance v1 -- the recurring contract bugs (silent-empty filter, lying
        # total/truncated, an error an LLM cannot act on, isError, closed error_code enum). Every
        # probe is derived from this server's own advertised schema; no per-repo probe list.
        env:
          CONFORMANCE_MCP_URL: http://127.0.0.1:${{ env.MCP_PORT }}
        run: uv run pytest tests/conformance/test_behaviour_v1.py -v
      - name: Logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --no-color --tail=200 || true
      - name: Teardown
        if: always()
        run: make docker-down || true
