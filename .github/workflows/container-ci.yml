name: Container CI

on:
  pull_request:
    paths:
      - mavedb_link/**
      - docker/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - container-release.json
      - vendor/genefoundry/**
      - .github/workflows/container-ci.yml
      - .github/workflows/container-release.yml
      - .github/workflows/data.yml
  push:
    branches:
      - main
    paths:
      - mavedb_link/**
      - docker/**
      - scripts/**
      - pyproject.toml
      - uv.lock
      - container-release.json
      - vendor/genefoundry/**
      - .github/workflows/container-ci.yml
      - .github/workflows/container-release.yml
      - .github/workflows/data.yml

concurrency:
  group: container-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-ci:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-ci.yml@86b11f7ed062ed84dfddcbd309e34da88f3dae5b
