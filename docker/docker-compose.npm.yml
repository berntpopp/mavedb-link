name: mavedb-link-npm

x-image: &image
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: mavedb-link:latest

x-data: &data
  MAVEDB_LINK_ENVIRONMENT: production
  MAVEDB_LINK_MIRROR__DATA_DIR: /data/reference/current
  MAVEDB_LINK_MIRROR__REFERENCE_ROOT: /data/reference
  MAVEDB_LINK_MIRROR__BUNDLE_URL: ${MAVEDB_DATA_BUNDLE_URL:?set exact release asset URL}
  MAVEDB_LINK_MIRROR__BUNDLE_RELEASE_TAG: ${MAVEDB_DATA_RELEASE_TAG:?set data-YYYY-MM-DD}
  MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_SHA256: ${MAVEDB_DATA_SHA256:?set compressed SHA-256}
  MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_EXPANDED_SHA256: ${MAVEDB_DATA_EXPANDED_SHA256:?set expanded SHA-256}
  MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_SCHEMA_VERSION: ${MAVEDB_DATA_SCHEMA_VERSION:-4.0.0}
  MAVEDB_LINK_MIRROR__DEVELOPMENT_LATEST: "false"
  MAVEDB_LINK_CACHE__DB_PATH: /data/cache/mavedb_cache.sqlite

services:
  mavedb_data_init:
    <<: *image
    entrypoint: ["mavedb-link-data", "pull"]
    environment: *data
    volumes:
      - mavedb-data:/data
    restart: "no"
    networks: [mavedb_link_internal_net]

  mavedb_link:
    <<: *image
    container_name: mavedb-link-npm
    depends_on:
      mavedb_data_init:
        condition: service_completed_successfully
    expose:
      - "8000"
    environment:
      <<: *data
      MAVEDB_LINK_HOST: 0.0.0.0
      MAVEDB_LINK_PORT: 8000
      MAVEDB_LINK_TRANSPORT: unified
      MAVEDB_LINK_MCP_PATH: /mcp
      MAVEDB_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","mavedb-link.genefoundry.org"]'
      MAVEDB_LINK_LOG_LEVEL: ${LOG_LEVEL_API:-INFO}
      MAVEDB_LINK_LOG_FORMAT: json
    volumes:
      - mavedb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp:rw,noexec,nosuid,size=512m,mode=1777]
    networks: [mavedb_link_internal_net, npm_proxy_network]
    deploy:
      resources:
        limits:
          memory: ${MAVEDB_API_MEMORY_LIMIT:-1g}
          cpus: ${MAVEDB_API_CPU_LIMIT:-1.0}
          pids: 256
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 256
    init: true

volumes:
  mavedb-data:

networks:
  mavedb_link_internal_net:
    driver: bridge
    name: mavedb_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
