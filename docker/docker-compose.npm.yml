# Nginx Proxy Manager deployment overlay for mavedb-link.
#
# Self-contained (used standalone, not layered on docker-compose.yml): one
# unified container serves the FastAPI REST API on / and the MCP streamable-HTTP
# transport on /mcp via a single port (8000). NPM reverse-proxies to the fixed
# container_name on the shared external npm_default network. Mirrors the
# GeneFoundry gnomad/vep/hpo/metadome/orphanet -link fleet pattern.
#
#   docker compose -f docker/docker-compose.npm.yml --env-file .env.docker up -d --build
name: mavedb-link-npm

services:
  mavedb_link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MAVEDB_LINK_GIT_SHA: ${MAVEDB_LINK_GIT_SHA:-unknown}
        MAVEDB_LINK_BUILT_AT: ${MAVEDB_LINK_BUILT_AT:-}
    image: mavedb-link:latest
    container_name: mavedb-link-npm
    expose:
      - "8000"
    environment:
      MAVEDB_LINK_HOST: 0.0.0.0
      MAVEDB_LINK_PORT: 8000
      MAVEDB_LINK_TRANSPORT: unified
      MAVEDB_LINK_MCP_PATH: /mcp
      MAVEDB_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","mavedb-link.genefoundry.org"]'
      MAVEDB_LINK_LOG_LEVEL: ${LOG_LEVEL_API:-INFO}
      MAVEDB_LINK_LOG_FORMAT: json
      # Local SQLite mirror (primary source; live API is the backup). The named
      # volume persists the built/pulled mirror across restarts. On first start
      # the entrypoint pulls the prebuilt artifact (bundle_url=latest); set
      # BUILD_LOCAL=true to build from the Zenodo dump instead.
      MAVEDB_LINK_MIRROR__DATA_DIR: /home/app/data
      # Keep the lazy mapped-variant cache writable under read_only rootfs.
      MAVEDB_LINK_CACHE__DB_PATH: /home/app/data/mavedb_cache.sqlite
      # MAVEDB_LINK_MIRROR__BUILD_LOCAL: "true"
      # MAVEDB_LINK_MIRROR__ENABLED: "false"
      # MAVEDB_LINK_API__BASE_URL: https://api.mavedb.org/api/v1
    volumes:
      - mavedb-data:/home/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot may fetch the prebuilt SQLite mirror artifact from GitHub.
      start_period: 180s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp/mavedb-link:rw,noexec,nosuid,size=512m,mode=1777
    networks:
      - mavedb_link_internal_net
      - npm_proxy_network
    deploy:
      resources:
        limits:
          memory: ${MAVEDB_API_MEMORY_LIMIT:-1g}
          cpus: ${MAVEDB_API_CPU_LIMIT:-1.0}
          pids: 256
        reservations:
          memory: 256m
          cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=mavedb-link,environment=production,proxy=npm"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

volumes:
  mavedb-data:
    driver: local

networks:
  mavedb_link_internal_net:
    driver: bridge
    name: mavedb_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
