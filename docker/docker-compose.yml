name: mavedb-link

x-image: &image
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: production
  image: mavedb-link:latest

x-data-environment: &data-environment
  MAVEDB_LINK_ENVIRONMENT: development
  MAVEDB_LINK_MIRROR__DATA_DIR: /home/app/reference/current
  MAVEDB_LINK_MIRROR__REFERENCE_ROOT: /home/app/reference
  MAVEDB_LINK_MIRROR__BUNDLE_URL: latest
  MAVEDB_LINK_MIRROR__DEVELOPMENT_LATEST: "true"

services:
  mavedb-data-init:
    <<: *image
    entrypoint: ["mavedb-link-data", "bootstrap"]
    environment: *data-environment
    volumes:
      - mavedb-reference:/home/app/reference:rw
    restart: "no"

  mavedb-link:
    <<: *image
    depends_on:
      mavedb-data-init:
        condition: service_completed_successfully
    environment:
      <<: *data-environment
      MAVEDB_LINK_HOST: 0.0.0.0
      MAVEDB_LINK_PORT: 8000
      MAVEDB_LINK_TRANSPORT: unified
      MAVEDB_LINK_MCP_PATH: /mcp
      MAVEDB_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      MAVEDB_LINK_LOG_FORMAT: json
      MAVEDB_LINK_CACHE__DB_PATH: /home/app/cache/mavedb_cache.sqlite
    volumes:
      - mavedb-reference:/home/app/reference:ro
      - mavedb-cache:/home/app/cache:rw
    ports:
      - "127.0.0.1:${MAVEDB_LINK_HOST_PORT:-8023}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  mavedb-reference:
  mavedb-cache:
