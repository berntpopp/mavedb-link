name: mavedb-link

# Two services, one image:
#
#   mavedb-data-init  (Container Release role: `init`)  one-shot; materializes the
#                     verified MaveDB mirror bundle into /data/reference on the
#                     `mavedb-data` named volume, then exits.
#   mavedb-link       (application)                     waits for the init to complete
#                     successfully, then serves from that mirror.
#
# ONE volume, mounted at /data on both services. /data and /tmp are the only writable
# targets the central compose policy approves for the application, and mavedb-link
# needs BOTH the immutable mirror and its own writable mapped-variant cache, so the
# two live side by side on one volume:
#
#   /data/reference/...  the verified, sha256-addressed mirror (written by the init;
#                        opened `mode=ro` + `query_only` by the server)
#   /data/cache/...      the deletable mapped-variant cache (written by the server)
#
# The cache MUST stay outside the reference root — mavedb_link.config enforces that
# in production so the cache can never mutate the immutable mirror.
#
# NOTE: no top-level `x-*` anchors. `docker compose config` emits extension fields
# verbatim and the central policy rejects unapproved top-level keys, so the shared
# blocks are anchored on real service keys instead.

services:
  mavedb-data-init:
    build: &build
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0}
        VCS_REF: ${VCS_REF:-0000000000000000000000000000000000000000}
        BUILD_DATE: ${BUILD_DATE:-1970-01-01T00:00:00Z}
    image: mavedb-link:latest
    # Explicit, shell-free argv. Dev/local resolves the newest published bundle; the
    # production overlay pins an exact release and switches to `pull`.
    entrypoint: ["mavedb-link-data", "bootstrap"]
    environment: &data-environment
      MAVEDB_LINK_ENVIRONMENT: development
      MAVEDB_LINK_MIRROR__DATA_DIR: /data/reference/current
      MAVEDB_LINK_MIRROR__REFERENCE_ROOT: /data/reference
      MAVEDB_LINK_MIRROR__BUNDLE_URL: latest
      MAVEDB_LINK_MIRROR__DEVELOPMENT_LATEST: "true"
      MAVEDB_LINK_CACHE__DB_PATH: /data/cache/mavedb_cache.sqlite
    volumes:
      - mavedb-data:/data
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mavedb-link:
    build: *build
    image: mavedb-link:latest
    depends_on:
      mavedb-data-init:
        condition: service_completed_successfully
    # Dev/local only — loopback-bound (127.0.0.1) so copying this file to a server
    # never publishes the unauthenticated backend on the public IP. Production fronts
    # the container with a reverse proxy via the prod/npm overlays (ports: !reset []).
    ports:
      - "127.0.0.1:${MAVEDB_LINK_HOST_PORT:-8023}:8000"
    environment:
      <<: *data-environment
      MAVEDB_LINK_HOST: 0.0.0.0
      MAVEDB_LINK_PORT: 8000
      MAVEDB_LINK_TRANSPORT: unified
      MAVEDB_LINK_MCP_PATH: /mcp
      MAVEDB_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      MAVEDB_LINK_LOG_FORMAT: json
    volumes:
      - mavedb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mavedb-data:
