services:
  mavedb-data-init:
    build: !reset null
    image: "${MAVEDB_LINK_IMAGE:?set ghcr.io/berntpopp/mavedb-link@sha256:<digest>}"
    pull_policy: missing
    entrypoint: ["mavedb-link-data", "pull"]
    environment: &production-data
      MAVEDB_LINK_ENVIRONMENT: production
      MAVEDB_LINK_MIRROR__DATA_DIR: /home/app/reference/current
      MAVEDB_LINK_MIRROR__REFERENCE_ROOT: /home/app/reference
      MAVEDB_LINK_MIRROR__BUNDLE_URL: ${MAVEDB_DATA_BUNDLE_URL:?set exact release asset URL}
      MAVEDB_LINK_MIRROR__BUNDLE_RELEASE_TAG: ${MAVEDB_DATA_RELEASE_TAG:?set data-YYYY-MM-DD}
      MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_SHA256: ${MAVEDB_DATA_SHA256:?set compressed SHA-256}
      MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_EXPANDED_SHA256: ${MAVEDB_DATA_EXPANDED_SHA256:?set expanded SHA-256}
      MAVEDB_LINK_MIRROR__BUNDLE_EXPECTED_SCHEMA_VERSION: ${MAVEDB_DATA_SCHEMA_VERSION:-4.0.0}
      MAVEDB_LINK_MIRROR__DEVELOPMENT_LATEST: "false"
      MAVEDB_LINK_CACHE__DB_PATH: /home/app/cache/mavedb_cache.sqlite
    read_only: true
    tmpfs:
      - /tmp/mavedb-link:rw,noexec,nosuid,size=512m,mode=1777
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 128

  mavedb-link:
    build: !reset null
    image: "${MAVEDB_LINK_IMAGE:?set ghcr.io/berntpopp/mavedb-link@sha256:<digest>}"
    pull_policy: missing
    environment:
      <<: *production-data
      MAVEDB_LINK_TRANSPORT: unified
      MAVEDB_LINK_LOG_LEVEL: INFO
      MAVEDB_LINK_LOG_FORMAT: json
      MAVEDB_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","mavedb-link.genefoundry.org"]'
    ports: !reset []
    expose: ["8000"]
    read_only: true
    tmpfs:
      - /tmp/mavedb-link:rw,noexec,nosuid,size=512m,mode=1777
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    pids_limit: 256
    init: true
    restart: on-failure
    deploy:
      resources:
        limits: {memory: 1G, cpus: "1.0", pids: 256}
        reservations: {memory: 256M, cpus: "0.25"}
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "5"}
